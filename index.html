<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume | Nagesh Bhutkade</title>
    <meta
      name="description"
      content="A modern single-page resume website with project highlights, experience, skills, and contact details."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="resume-card">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Resume Portfolio</p>
            <h1 id="name"></h1>
            <p class="role" id="title"></p>
            <p class="summary" id="summary"></p>
          </div>
          <div class="hero-actions">
            <a class="primary-button" id="emailLink" href="#">Contact</a>
            <button class="secondary-button" id="printButton" type="button">Download PDF</button>
          </div>
        </section>

        <section class="grid-layout">
          <aside class="sidebar">
            <div class="panel">
              <h2>Contact</h2>
              <ul class="meta-list" id="contactList"></ul>
            </div>

            <div class="panel">
              <h2>Skills</h2>
              <div class="chip-list" id="skillsList"></div>
            </div>

            <div class="panel">
              <h2>Education</h2>
              <div id="educationList"></div>
            </div>
          </aside>

          <div class="content">
            <section class="panel">
              <div class="section-heading">
                <h2>Experience</h2>
                <span>Recent work and impact</span>
              </div>
              <div class="timeline" id="experienceList"></div>
            </section>

            <section class="panel">
              <div class="section-heading">
                <h2>Projects</h2>
                <span>Selected builds</span>
              </div>
              <div class="project-grid" id="projectsList"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
